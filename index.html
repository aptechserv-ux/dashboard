<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AP Smart Policing — Unit Performance Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:'Segoe UI',Tahoma,sans-serif;font-size:13px}
.wrap{max-width:1300px;margin:0 auto;padding:12px 14px}
.header{background:linear-gradient(135deg,#0f2a52,#1e40af);border-radius:14px;padding:18px 24px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-title{font-size:20px;font-weight:800;letter-spacing:.3px}
.header-sub{opacity:.8;font-size:12px;margin-top:3px}
.stat-box{text-align:center;background:rgba(255,255,255,.12);border-radius:10px;padding:10px 18px;margin-left:auto}
.stat-box .num{font-size:28px;font-weight:800}
.stat-box .lbl{font-size:11px;opacity:.7}
.alert{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#92400e}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;border:none;font-weight:600;font-size:13px;background:#fff;color:#374151;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.tab.active{background:#1e40af;color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.35)}
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-weight:700;font-size:15px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
table{border-collapse:collapse;width:100%}
th{padding:9px 8px;text-align:center;font-size:11px}
td{padding:7px 8px;text-align:center;font-size:12px}
.tbl-hdr{background:#0f2a52;color:#fff}
.tbl-hdr th{white-space:nowrap}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:#e8f0fe!important}
.badge{display:inline-block;border-radius:6px;padding:2px 9px;font-weight:700}
.rank-badge{border-radius:5px;padding:2px 7px;font-weight:700;font-size:11px}
.grade-A{color:#059669;background:#d1fae5}
.grade-B{color:#0284c7;background:#e0f2fe}
.grade-C{color:#d97706;background:#fef3c7}
.grade-D{color:#ea580c;background:#ffedd5}
.grade-E{color:#dc2626;background:#fee2e2}
.up{color:#059669;font-weight:700}
.dn{color:#dc2626;font-weight:700}
.new-badge{font-size:9px;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;font-weight:700}
.na{color:#d1d5db;font-size:10px}
select{padding:8px 14px;border-radius:8px;border:1px solid #d1d5db;font-size:13px;cursor:pointer}
.legend{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;align-items:center}
.legend span{border-radius:6px;padding:3px 10px;font-weight:700;font-size:12px}
.ovx{overflow-x:auto}
.ovxy{overflow-x:auto;overflow-y:auto;max-height:70vh}
/* bar chart */
.bar-chart{width:100%;overflow-x:auto}
.bar-chart svg{display:block}
/* hero card */
.hero{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.hero-grade{border-radius:14px;padding:14px 28px;text-align:center;min-width:100px}
.hero-grade .g{font-size:46px;font-weight:900;line-height:1}
.hero-grade .s{font-size:20px;font-weight:700}
.cat-grid{display:grid;grid-template-columns:repeat(4,auto);gap:8px 20px}
.sort-btns{display:flex;gap:8px;align-items:center;margin-left:auto}
.sort-btn{padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:#e5e7eb;color:#374151}
.sort-btn.active{background:#1e40af;color:#fff}
.wk-btn{padding:10px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:#fff;color:#374151;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.wk-btn.active{background:#1e40af;color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.35)}
.new-card{border-radius:10px;padding:12px 20px;text-align:center;min-width:140px;display:inline-block;margin:6px}
/* sticky heatmap header */
.heat-sticky-col{position:sticky;left:0;background:#fff;z-index:1;border-right:1px solid #e5e7eb}
.heat-hdr-sticky{position:sticky;left:0;z-index:11}
/* radar */
.radar-wrap{display:flex;justify-content:center}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:3px}
</style>
</head>

// ─── SCORING ENGINE ───────────────────────────────────────────────────────────
function computeScores(rd, districts, params) {
  const totalW = params.reduce((s,p)=>s+p.w,0);
  const ns = {};
  districts.forEach(d=>{ ns[d]={}; });
  params.forEach(p=>{
    let vals = districts.map(d=>{ let v=rd[p.k]?rd[p.k][d]:null; if(v==null)return null; if(p.cap)v=Math.min(v,p.cap); if(p.sq)v=Math.sqrt(v); return v; });
    const valid=vals.filter(v=>v!=null);
    if(!valid.length){ districts.forEach(d=>{ ns[d][p.k]=50; }); return; }
    const mn=Math.min(...valid), mx=Math.max(...valid);
    districts.forEach((d,i)=>{ let v=vals[i],sc; if(v==null){sc=p.nul==="zero"?0:50;}else{sc=mx===mn?50:(v-mn)/(mx-mn)*100; if(p.lb)sc=100-sc;} ns[d][p.k]=Math.round(sc*10)/10; });
  });
  const comp={};
  districts.forEach(d=>{ let s=0; params.forEach(p=>s+=(ns[d][p.k]*p.w)/totalW); comp[d]=Math.round(s*10)/10; });
  return {ns,comp};
}

const {ns:NS, comp:COMP} = computeScores(RD,D,PARAMS);
const {comp:PCOMP} = computeScores(PREV_RD,PREV_D,PARAMS);
const RANKED = [...D].sort((a,b)=>COMP[b]-COMP[a]).map((d,i)=>({d,rank:i+1,score:COMP[d]}));
const PRANKED = [...PREV_D].sort((a,b)=>PCOMP[b]-PCOMP[a]).map((d,i)=>({d,rank:i+1}));
const PRANKMAP = Object.fromEntries(PRANKED.map(r=>[r.d,r.rank]));
const WK_PARAMS = PARAMS.filter(p=>p.wk);
const {comp:WCOMP} = computeScores(RD,D,WK_PARAMS);
const WRANKED = [...D].sort((a,b)=>WCOMP[b]-WCOMP[a]).map((d,i)=>({d,rank:i+1,score:WCOMP[d]}));
const IMPR = D.filter(d=>PCOMP[d]!=null).map(d=>({d,delta:COMP[d]-PCOMP[d],curr:COMP[d],prev:PCOMP[d]})).sort((a,b)=>b.delta-a.delta).map((r,i)=>({...r,rank:i+1}));
const CATS=[...new Set(PARAMS.map(p=>p.cat))];

function catScore(d,cat){ const ps=PARAMS.filter(p=>p.cat===cat),tw=ps.reduce((s,p)=>s+p.w,0); return Math.round(ps.reduce((s,p)=>s+NS[d][p.k]*p.w,0)/tw); }
function grade(s){ if(s>=75)return{g:"A",c:"#059669",bg:"#d1fae5",bd:"#10b981"}; if(s>=62)return{g:"B",c:"#0284c7",bg:"#e0f2fe",bd:"#38bdf8"}; if(s>=49)return{g:"C",c:"#d97706",bg:"#fef3c7",bd:"#fbbf24"}; if(s>=36)return{g:"D",c:"#ea580c",bg:"#ffedd5",bd:"#fb923c"}; return{g:"E",c:"#dc2626",bg:"#fee2e2",bd:"#f87171"}; }
function cellBg(s){ return `hsla(${Math.round(s*1.2)},65%,88%,0.9)`; }
function mvBadge(d,cr){ const pr=PRANKMAP[d]; if(pr==null)return'<span class="new-badge">NEW</span>'; const mv=pr-cr; if(!mv)return'<span style="color:#9ca3af">—</span>'; return mv>0?`<span class="up">▲${mv}</span>`:`<span class="dn">▼${Math.abs(mv)}</span>`; }
function deltaBadge(d){ const p=PCOMP[d]; if(p==null)return''; const dv=COMP[d]-p; if(Math.abs(dv)<0.05)return'<span style="color:#9ca3af;font-size:10px">±0</span>'; return dv>0?`<span class="up" style="font-size:10px">↑${dv.toFixed(1)}</span>`:`<span class="dn" style="font-size:10px">↓${Math.abs(dv).toFixed(1)}</span>`; }
function medal(r){ return r===1?"🥇":r===2?"🥈":r===3?"🥉":`#${r}`; }

// ─── SVG BAR CHART ────────────────────────────────────────────────────────────
function barChartSVG(data, width, height, margin, colorFn, tooltipKey) {
  // data = [{label, value, color?}]
  const W=width, H=height, ML=margin.left||40, MR=margin.right||10, MT=margin.top||10, MB=margin.bottom||70;
  const pw=W-ML-MR, ph=H-MT-MB;
  const max=Math.max(...data.map(d=>d.value),1);
  const bw=Math.max(pw/data.length-3,4);
  let bars='', labels='', ylines='';
  // Y gridlines
  [0,25,50,75,100].forEach(v=>{ const y=ph-(v/max)*ph+MT; ylines+=`<line x1="${ML}" y1="${y}" x2="${W-MR}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`; ylines+=`<text x="${ML-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#6b7280">${v}</text>`; });
  data.forEach((d,i)=>{
    const x=ML+i*(pw/data.length)+(pw/data.length-bw)/2;
    const bh=Math.max((d.value/max)*ph,1);
    const y=MT+ph-bh;
    const col=d.color||grade(d.value).bd;
    bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${col}" rx="3" class="bar" data-tip="${d.label}: ${d.value.toFixed(1)}"/>`;
    // rotated label
    const lx=x+bw/2, ly=H-MB+5;
    labels+=`<text transform="rotate(-50,${lx},${ly})" x="${lx}" y="${ly}" text-anchor="end" font-size="9" fill="#374151">${d.label.length>12?d.label.substring(0,11)+'…':d.label}</text>`;
  });
  return `<div style="overflow-x:auto"><svg width="${W}" height="${H}" style="display:block;min-width:${W}px">
    ${ylines}${bars}${labels}
    <text x="${ML}" y="${MT-2}" font-size="10" fill="#6b7280"></text>
  </svg></div>`;
}

function horizBarSVG(data) {
  const W=340,LW=90,RW=W-LW-10,H=data.length*20+10;
  let rows='';
  data.forEach((d,i)=>{
    const y=i*20+5, bw=Math.max((d.value/100)*RW,1), col=grade(d.value).bd;
    rows+=`<text x="${LW-4}" y="${y+13}" text-anchor="end" font-size="9" fill="#374151">${d.label}</text>`;
    rows+=`<rect x="${LW}" y="${y+2}" width="${bw}" height="13" fill="${col}" rx="2"/>`;
    rows+=`<text x="${LW+bw+3}" y="${y+13}" font-size="9" fill="#374151">${d.value.toFixed(0)}</text>`;
  });
  return `<svg width="${W}" height="${H}" style="display:block;width:100%">${rows}</svg>`;
}

function radarSVG(d) {
  const cx=150,cy=150,r=110,cats=CATS;
  const n=cats.length;
  let spokes='',poly='',labels='';
  cats.forEach((cat,i)=>{
    const angle=(i/n)*2*Math.PI-Math.PI/2;
    const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
    spokes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    const sc=catScore(d,cat)/100;
    const lx=cx+(r+18)*Math.cos(angle),ly=cy+(r+18)*Math.sin(angle);
    labels+=`<text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="9" fill="#374151">${cat}</text>`;
  });
  [25,50,75,100].forEach(pct=>{
    const pts=cats.map((_,i)=>{ const a=(i/n)*2*Math.PI-Math.PI/2; return `${cx+(r*pct/100)*Math.cos(a)},${cy+(r*pct/100)*Math.sin(a)}`; }).join(' ');
    spokes+=`<polygon points="${pts}" fill="none" stroke="#e5e7eb" stroke-width="1"/>`;
  });
  const {bd}=grade(catScore(d,CATS[0]));
  const pts=cats.map((cat,i)=>{ const a=(i/n)*2*Math.PI-Math.PI/2,sc=catScore(d,cat)/100; return `${cx+r*sc*Math.cos(a)},${cy+r*sc*Math.sin(a)}`; }).join(' ');
  poly=`<polygon points="${pts}" fill="${bd}44" stroke="${bd}" stroke-width="2"/>`;
  return `<svg width="300" height="300" style="display:block;margin:auto">${spokes}${poly}${labels}</svg>`;
}

        <td style="font-weight:700">#${wR}</td><td style="text-align:left;font-weight:600">${d}</td>
        <td><span style="background:${cellBg(wS)};border-radius:5px;padding:2px 8px;font-weight:700">${wS.toFixed(1)}</span></td>
        <td style="font-weight:700">#${oR}</td><td style="color:${grade(oS).c};font-weight:700">${oS.toFixed(1)}</td>
        <td style="font-weight:700;color:${diff>3?"#059669":diff<-3?"#dc2626":"#6b7280"}">${diff===0?"—":diff>0?`+${diff} better`:`${diff} lower`}</td>
      </tr>`;
    }).join('');
    return btns+`<div class="card"><div class="card-title">📅 Weekly Performance Rank</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Scored on 9 weekly metrics only. Reflects performance this specific week regardless of cumulative standing.</div>
      ${barChartSVG(barData,chartW,300,{left:36,right:10,top:10,bottom:75})}
    </div>
    <div class="card"><div class="card-title">Weekly Rank vs Overall Rank</div><div class="ovx">
      <table><thead><tr class="tbl-hdr"><th style="text-align:left">Wk Rank</th><th style="text-align:left">District</th><th>Wk Score</th><th>Overall Rank</th><th>Overall Score</th><th>Difference</th></tr></thead>
      <tbody>${tblRows}</tbody></table></div></div>`;
  }

  // improved
  const barData=IMPR.map(r=>({label:r.d,value:r.delta,color:r.delta>=0?"#10b981":"#f87171"}));
  // for improvement chart we need different scale
  const maxD=Math.max(...IMPR.map(r=>Math.abs(r.delta)),1);
  const chartW2=Math.max(800,IMPR.length*28);
  const H=280,ML=40,MR=10,MT=10,MB=70,pw=chartW2-ML-MR,ph=H-MT-MB;
  const zero=MT+ph/2;
  let bars2='',labels2='',lines2='';
  lines2+=`<line x1="${ML}" y1="${zero}" x2="${chartW2-MR}" y2="${zero}" stroke="#374151" stroke-width="1.5"/>`;
  IMPR.forEach((r,i)=>{ const bw=Math.max(pw/IMPR.length-3,4),x=ML+i*(pw/IMPR.length)+(pw/IMPR.length-bw)/2;
    const scale=ph/2/maxD,bh=Math.abs(r.delta)*scale,y=r.delta>=0?zero-bh:zero;
    bars2+=`<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(bh,1)}" fill="${r.delta>=0?"#10b981":"#f87171"}" rx="2"/>`;
    const lx=x+bw/2,ly=H-MB+5;
    labels2+=`<text transform="rotate(-50,${lx},${ly})" x="${lx}" y="${ly}" text-anchor="end" font-size="9" fill="#374151">${r.d.length>12?r.d.substring(0,11)+'…':r.d}</text>`;
  });
  const chart2=`<div style="overflow-x:auto"><svg width="${chartW2}" height="${H}" style="display:block;min-width:${chartW2}px">${lines2}${bars2}${labels2}</svg></div>`;
  const tblRows2=IMPR.map(({d,rank:iR,delta,curr,prev})=>{ const cR=RANKED.find(r=>r.d===d)?.rank;const pR=PRANKMAP[d];const rc=pR&&cR?pR-cR:null;
    return `<tr class="clickable" onclick="goDetail('${d}')" style="border-bottom:1px solid #f0f0f0;background:${iR%2===0?"#f7f9fc":"#fff"}">
      <td style="font-weight:700">#${iR}</td><td style="text-align:left;font-weight:600">${d}</td>
      <td>${prev.toFixed(1)}</td><td style="font-weight:700;color:${grade(curr).c}">${curr.toFixed(1)}</td>
      <td style="font-weight:800;color:${delta>=0?"#059669":"#dc2626"};font-size:13px">${delta>=0?"+":""}${delta.toFixed(1)}</td>
      <td>#${pR}</td><td>#${cR}</td>
      <td style="font-weight:700;color:${rc>0?"#059669":rc<0?"#dc2626":"#6b7280"}">${rc==null?"—":rc===0?"—":rc>0?`▲${rc}`:`▼${Math.abs(rc)}`}</td>
    </tr>`;
  }).join('');
  const newUnits=D.filter(d=>!PRANKMAP[d]).map(d=>{ const {g,c,bg}=grade(COMP[d]);const cr=RANKED.find(r=>r.d===d)?.rank;
    return `<span class="new-card" style="background:${bg}"><div style="font-weight:700;font-size:14px">${d}</div><div style="color:${c};font-weight:800;font-size:22px">${COMP[d].toFixed(1)}</div><div style="color:${c};font-size:13px">Grade ${g} · #${cr}</div></span>`;
  }).join('');
  return btns+`<div class="card"><div class="card-title">🚀 Most Improved This Week</div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:12px">Ranked by composite score change vs week ending 25 Mar 2026. Green = improved, Red = declined.</div>
    ${chart2}</div>
  <div class="card"><div class="card-title">Score Change Detail</div><div class="ovx">
    <table><thead><tr class="tbl-hdr"><th style="text-align:left">#</th><th style="text-align:left">District</th><th>Prev</th><th>Curr</th><th>Change</th><th>Prev Rank</th><th>Curr Rank</th><th>Rank Chg</th></tr></thead>
    <tbody>${tblRows2}</tbody></table></div></div>
  <div class="card"><div class="card-title">🆕 New Entrants This Week</div><div>${newUnits}</div></div>`;
}

function renderDetail() {
  const d=state.sel, score=COMP[d];
  const {g,c,bg,bd}=grade(score);
  const distRank=RANKED.find(r=>r.d===d).rank;
  const prevScore=PCOMP[d];
  const delta=prevScore!=null?score-prevScore:null;
  const mv=PRANKMAP[d]!=null?PRANKMAP[d]-distRank:null;
  const mvStr=mv==null?'<span class="new-badge" style="font-size:12px">NEW ENTRANT</span>':mv>0?`<span class="up">▲${mv} ranks up</span>`:mv<0?`<span class="dn">▼${Math.abs(mv)} ranks down</span>`:'<span style="color:#6b7280">No rank change</span>';
  const dStr=delta==null?'':delta>0?`<span class="up">↑+${delta.toFixed(1)} pts</span>`:delta<0?`<span class="dn">↓${delta.toFixed(1)} pts</span>`:'<span style="color:#6b7280">No change</span>';
  const opts=RANKED.map(({d:dd,rank,score:ss})=>`<option value="${dd}" ${dd===d?"selected":""}>#${rank} ${dd} (${ss.toFixed(1)})</option>`).join('');
  const catGrid=CATS.map(cat=>{ const cs=catScore(d,cat);const cg=grade(cs); return `<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:${cg.c}">${cs}</div><div style="font-size:10px;color:#6b7280;font-weight:600">${cat}</div></div>`; }).join('');
  const totalW=PARAMS.reduce((s,p)=>s+p.w,0);
  const tblRows=PARAMS.map(p=>{ const raw=RD[p.k][d]; const ns=NS[d][p.k]; const contrib=(ns*p.w)/totalW;
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="text-align:left;font-weight:600;padding:8px">${p.l}</td>
      <td><span style="background:#eff6ff;color:#1d4ed8;border-radius:5px;padding:2px 5px;font-size:10px">${p.cat}</span></td>
      <td style="font-weight:500">${raw==null?'<span class="na">N/A</span>':typeof raw==="number"?raw.toFixed(2):raw}</td>
      <td><span style="background:${cellBg(ns)};border-radius:5px;padding:3px 10px;font-weight:700">${ns.toFixed(1)}</span></td>
      <td style="font-weight:700">${p.w}%</td><td style="font-weight:700;color:${grade(ns).c}">${contrib.toFixed(2)}</td>
      <td style="text-align:left;color:#6b7280;font-size:11px">${p.lb?"⬇ Lower=Better":"⬆ Higher=Better"}</td>
    </tr>`;
  }).join('');
  const hbarData=PARAMS.map(p=>({label:p.l.substring(0,14),value:NS[d][p.k]}));
  return `<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <label style="font-weight:700">Select District:</label>
    <select onchange="setState({sel:this.value})">${opts}</select>
  </div>
  <div class="card" style="background:linear-gradient(135deg,${bd}22,${bd}11);border:2px solid ${bd}55">
    <div class="hero">
      <div>
        <div style="font-size:26px;font-weight:800">${d}</div>
        <div style="color:#6b7280;font-size:13px">Overall Rank #${distRank} of ${D.length}</div>
        <div style="margin-top:6px;display:flex;gap:10px">${mvStr} ${dStr}</div>
      </div>
      <div class="hero-grade" style="background:${bg};margin-left:auto">
        <div class="g" style="color:${c}">${g}</div>
        <div class="s" style="color:${c}">${score.toFixed(1)}<span style="font-size:12px;opacity:.6">/100</span></div>
        ${prevScore!=null?`<div style="font-size:11px;color:#6b7280;margin-top:4px">Prev: ${prevScore.toFixed(1)}</div>`:""}
      </div>
      <div class="cat-grid">${catGrid}</div>
    </div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title" style="font-size:13px">Category Spider Chart</div><div class="radar-wrap">${radarSVG(d)}</div></div>
    <div class="card"><div class="card-title" style="font-size:13px">Parameter Scores (0–100)</div>${horizBarSVG(hbarData)}</div>
  </div>
  <div class="card"><div class="card-title" style="font-size:13px">Raw Data & Score Breakdown</div><div class="ovx">
    <table><thead><tr style="background:#f3f4f6">
      <th style="text-align:left">Parameter</th><th>Cat</th><th>Raw Value</th><th>Norm Score</th><th>Wt</th><th>Contribution</th><th style="text-align:left">Direction</th>
    </tr></thead><tbody>${tblRows}</tbody>
    <tfoot><tr style="background:#0f2a52;color:#fff"><td colspan="5" style="padding:8px 10px;font-weight:700">COMPOSITE SCORE</td>
      <td style="text-align:center;font-weight:800;font-size:16px;color:${bg}">${score.toFixed(1)}</td>
      <td style="text-align:center;color:rgba(255,255,255,.7)">${g} Grade</td></tr></tfoot>
    </table></div></div>`;
}

function renderMethodology() {
  const rows=PARAMS.map((p,i)=>`<tr style="border-bottom:1px solid #f0f0f0;background:${i%2===0?"#fff":"#f7f9fc"}">
    <td style="text-align:left;color:#9ca3af">${i+1}</td><td style="text-align:left;font-weight:600">${p.l}</td>
    <td><span style="background:#eff6ff;color:#1d4ed8;border-radius:5px;padding:2px 7px;font-size:11px">${p.cat}</span></td>
    <td style="font-weight:800;color:#1e40af">${p.w}%</td>
    <td><span style="background:${p.wk?"#f0fdf4":"#f0f9ff"};color:${p.wk?"#166534":"#075985"};border-radius:4px;padding:1px 6px;font-size:11px">${p.wk?"Weekly":"Cumulative"}</span></td>
    <td style="font-size:11px">${p.lb?"⬇ Lower=Better":"⬆ Higher=Better"}</td>
  </tr>`).join('');
  return `<div class="card"><div class="card-title">📊 Composite Scoring Methodology</div>
    <p style="color:#374151;line-height:1.7;font-size:13px">30 police units evaluated across <strong>15 parameters</strong> from 9 Smart Policing applications. Raw values normalized to <strong>0–100</strong> using min-max normalization. Lower-is-better parameters are inverted. NATGRID and CriMAC are <strong>√-transformed</strong>. Null: <strong>0</strong> for activity metrics, <strong>50 (neutral)</strong> for structural metrics. Final score = weighted average.</p>
  </div>
  <div class="card"><div class="card-title">Parameter Weights</div><div class="ovx">
    <table><thead><tr class="tbl-hdr"><th style="text-align:left">#</th><th style="text-align:left">Parameter</th><th>Category</th><th>Wt</th><th>Type</th><th>Direction</th></tr></thead>
    <tbody>${rows}</tbody><tfoot><tr style="background:#0f2a52;color:#fff"><td colspan="3" style="padding:8px;font-weight:700">TOTAL</td><td style="text-align:center;font-weight:800;font-size:14px">${PARAMS.reduce((s,p)=>s+p.w,0)}%</td><td colspan="2"></td></tr></tfoot>
    </table></div></div>
  <div class="grid2">
    <div class="card"><div style="font-weight:700;font-size:14px;color:#dc2626;margin-bottom:8px">⚠️ Known Limitations</div><ul style="font-size:12px;line-height:1.9;padding-left:18px;color:#374151">
      <li><strong>Markapuram & Polavaram</strong> — newly formed districts; parent district values used as proxy.</li>
      <li><strong>CCTNS Forms/FIR</strong> — inflated for Markapuram/Polavaram. Capped at 15.</li>
      <li><strong>ASR & Polavaram Dial 112 RT</strong> — hilly terrain (verified). Capped at 30 min for scoring.</li>
      <li><strong>PVP Manyam Dial 112 RT</strong> — 37m 17s this week; capped at 30 min.</li>
      <li><strong>MedLEaPR MLC%</strong> — hospital non-adoption, not unit negligence.</li>
      <li><strong>eSakshya SID%</strong> — till-date %; units clearing backlog.</li>
      <li><strong>Dial 112</strong> — GRP units have no control rooms; assigned neutral (50).</li>
      <li><strong>Citizen Portal Pending%</strong> — fresh data provided for all 30 units for week ending 01 Apr 2026. GRP units reported &lt;1% (scored as 1%).</li>
      <li><strong>No crime outcome data</strong> — scoring reflects technology adoption only.</li>
    </ul></div>
    <div class="card"><div style="font-weight:700;font-size:14px;color:#059669;margin-bottom:8px">💡 Recommended Additional Data</div><ul style="font-size:12px;line-height:1.9;padding-left:18px;color:#374151">
      <li>Crime Resolution Rate</li><li>CCTNS Data Quality Score</li><li>MedLEaPR Report Turnaround</li>
      <li>eSakshya Weekly Rate (new SIDs per new FIRs)</li><li>Dial 112 Dispatch Time</li>
      <li>Preventive Action Yield</li><li>Drone Intelligence Yield</li>
      <li>Citizen Satisfaction Score</li><li>Court Attendance Rate</li><li>Narcotics/Liquor Seizure Data</li>
    </ul></div>
  </div>
  <div class="card" style="background:#eff6ff;border:1px solid #bfdbfe">
    <div style="font-weight:700;color:#1d4ed8;margin-bottom:8px">🔵 Grade Scale</div>
    <div class="legend"><span class="grade-A">A: ≥ 75</span><span class="grade-B">B: 62–74</span><span class="grade-C">C: 49–61</span><span class="grade-D">D: 36–48</span><span class="grade-E">E: &lt; 36</span></div>
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById("app");
  const TABS=[["rankings","🏆 Rankings"],["heatmap","🔥 Heatmap"],["trends","📈 Trends"],["detail","🔍 District Detail"],["methodology","📋 Methodology"]];
  let content;
  if(state.tab==="rankings")content=renderRankings();
  else if(state.tab==="heatmap")content=renderHeatmap();
  else if(state.tab==="trends")content=renderTrends();
  else if(state.tab==="detail")content=renderDetail();
  else content=renderMethodology();

  app.innerHTML=`
  <div class="header">
    <div style="font-size:36px">🚔</div>
    <div><div class="header-title">AP Smart Policing — Unit Performance Dashboard</div>
    <div class="header-sub">Week 26 March – 01 April 2026 &nbsp;·&nbsp; 30 Police Units &nbsp;·&nbsp; 15 Parameters &nbsp;·&nbsp; Composite Weighted Scoring</div></div>
    <div style="display:flex;gap:12px;margin-left:auto">
      <div class="stat-box"><div class="lbl">UNITS</div><div class="num">${D.length}</div></div>
      <div class="stat-box"><div class="lbl">PREV WEEK</div><div style="font-size:13px;font-weight:700;margin-top:4px">25 Mar 2026</div></div>
    </div>
  </div>
  <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#166534">
    ✅ All 15 parameters updated with data for week ending <strong>01 April 2026</strong> — including fresh Citizen Portal Pending% for all 30 units.
  </div>
  <div class="tabs">${TABS.map(([k,l])=>`<button class="tab ${state.tab===k?"active":""}" onclick="setState({tab:'${k}'})">${l}</button>`).join('')}</div>
  ${content}
  <div style="text-align:center;color:#9ca3af;font-size:11px;margin-top:12px">Data: Smart Policing Performance Report — 02 April 2026 &nbsp;·&nbsp; Scoring Model v2.0 &nbsp;·&nbsp; 30 Units · 15 Parameters</div>
  `;
}

function goDetail(d){ setState({tab:"detail",sel:d}); }
render();
</script>
</body>
</html>
